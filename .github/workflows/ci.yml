name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  core-lint:
    name: Core — Lint
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      contains(join(github.event.pull_request.changed_files.*.filename, ','), 'core/')
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check src/

      - name: Ruff format (check)
        run: ruff format --check src/

  core-test:
    name: Core — Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: tik_test
          POSTGRES_USER: tik
          POSTGRES_PASSWORD: tik_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TIK_ENV: development
      TIK_SECRET_KEY: test-secret-key-32-chars-long!!
      TIK_DB_HOST: localhost
      TIK_DB_NAME: tik_test
      TIK_DB_USER: tik
      TIK_DB_PASSWORD: tik_dev
      TIK_REDIS_HOST: localhost

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: core/pyproject.toml

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        run: pytest -v --cov=tik_core --cov-report=term-missing
